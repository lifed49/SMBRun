<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MBRun – The Mario's Quest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --parchment: #FBD000;
    --parchment-dark: #FBD000;
    --ink: #0300ff;
    --stone: #7a6f5e;
    --stone-light: #FBD000;
    --blood: #8b1a1a;
    --gold: #c8922a;
    --gold-light: #FBD000;
    --sky1: #7ec8e3;
    --sky2: #b8e0f0;
    --grass: #4a7c3f;
    --grass-dark: #2e5426;
    --ground: #6b5a3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', serif;
    overflow: hidden;
  }

  #title {
    color: var(--gold-light);
    font-family: 'Press Start 2P', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-shadow: 0 0 20px rgba(251,208,0,0.6), 2px 2px 0 #000;
    margin-bottom: 6px;
  }

  #subtitle {
    color: var(--parchment-dark);
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.7;
  }

  #game-wrapper {
    position: relative;
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 6px var(--ink), 0 0 0 8px var(--gold), 0 0 40px rgba(200,146,42,0.3);
  }

  canvas {
    display: block;
    background: var(--sky1);
  }

  #ui-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 8px 16px;
    background: linear-gradient(to right, #1a1208, #0300ff, #1a1208);
    border-top: 2px solid var(--gold);
  }

  .ui-label {
    color: var(--parchment-dark);
    font-size: 0.4rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .ui-value {
    color: var(--gold-light);
    font-size: 0.75rem;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(251,208,0,0.5);
  }

  #controls-hint {
    margin-top: 10px;
    color: var(--stone-light);
    font-size: 0.4rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(4, 156, 216, 0.92);
    z-index: 10;
  }

  #overlay h2 {
    font-family: 'Press Start 2P', serif;
    color: var(--gold-light);
    font-size: 1.0rem;
    text-shadow: 0 0 20px rgba(251,208,0,0.8);
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.6;
  }

  #overlay p {
    color: var(--parchment);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    opacity: 0.85;
    text-align: center;
    line-height: 1.8;
  }

  #overlay .final-score {
    color: var(--gold-light);
    font-size: 0.65rem;
    font-weight: 700;
    margin: 10px 0 20px;
    text-align: center;
    line-height: 2;
  }

  #start-btn {
    background: linear-gradient(to bottom, var(--gold), #7a5010);
    color: var(--ink);
    border: none;
    padding: 12px 28px;
    font-family: 'Press Start 2P', serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0% 50%);
    transition: filter 0.15s;
  }
  #start-btn:hover { filter: brightness(1.2); }

  /* ── MOBILE & RESPONSIVE ───────────────────────── */
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 6px var(--ink), 0 0 0 8px var(--gold), 0 0 40px rgba(200,146,42,0.3);
    max-width: 100vw;
  }

  #scale-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top center;
  }

  /* Jump button — mobile only */
  #jump-btn {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(251,208,0,0.85);
    border: 3px solid #000;
    color: #000;
    font-family: 'Press Start 2P', serif;
    font-size: 0.55rem;
    font-weight: 700;
    cursor: pointer;
    z-index: 100;
    box-shadow: 0 4px 0 #7a5010, 0 6px 12px rgba(0,0,0,0.4);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    text-align: center;
    line-height: 1.2;
  }
  #jump-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #7a5010; }

  /* Rotate overlay */
  #rotate-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0300ff;
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #FBD000;
    font-family: 'Press Start 2P', serif;
    font-size: 0.7rem;
    text-align: center;
    gap: 20px;
    padding: 20px;
    line-height: 2;
  }
  #rotate-overlay .rotate-icon {
    font-size: 3rem;
    animation: spin 2s ease-in-out infinite alternate;
  }
  @keyframes spin {
    from { transform: rotate(-20deg); }
    to   { transform: rotate(20deg); }
  }

  @media (pointer: coarse) {
    #jump-btn { display: flex; align-items: center; justify-content: center; }
    #controls-hint { display: none; }
  }
</style>
</head>
<body>

<div id="rotate-overlay"><div class="rotate-icon">📱</div><div>Please rotate your device to landscape mode</div></div>
<button id="jump-btn" ontouchstart="handleJumpBtn(event)">JUMP</button>
<div id="scale-wrapper">
<div id="title">🍄 SMBRun 🍄</div>
<div id="subtitle">Super Mario Run</div>

<div id="game-wrapper">
  <canvas id="canvas" width="800" height="260"></canvas>
  <div id="ui-bar">
    <div>
      <div class="ui-label">Distance</div>
      <div class="ui-value" id="score-display">0</div>
    </div>
    <div style="text-align:center">
      <div class="ui-label">Lives</div>
      <div class="ui-value" id="lives-display">♥ ♥ ♥</div>
    </div>
    <div style="text-align:right">
      <div class="ui-label">Best</div>
      <div class="ui-value" id="best-display">0</div>
    </div>
  </div>

  <div id="overlay">
    <h2 id="overlay-title">Super Mario Run</h2>
    <p id="overlay-msg">Press SPACE or TAP to begin your quest</p>
    <p id="overlay-score" class="final-score" style="display:none"></p>
    <button id="start-btn" onclick="startGame()">Begin Quest</button>
  </div>
</div>

<div id="controls-hint">SPACE / TAP — Jump &nbsp;|&nbsp; Double-tap — Double Jump</div>
</div><!-- end scale-wrapper -->

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── COLOURS ──────────────────────────────────────────────
const C = {
  sky1:'#7ec8e3', sky2:'#b8e0f0',
  cloud:'rgba(255,255,255,0.85)',
  sun:'#f9e87a',
  groundTop:'#4a7c3f', groundTopDark:'#2e5426',
  groundBody:'#6b5a3e', groundBodyDark:'#4a3828',
  stone:'#888070', stoneDark:'#5a5040', stoneLight:'#b0a48e',
  treeLeaf:'#2d5a1e', treeLeafDark:'#1a3a10', treeLeafLight:'#4a8a30',
  treeTrunk:'#6b4226', treeTrunkDark:'#4a2c18',
  // Mario colours
  kArmor:'#8a9ab0', kArmorDark:'#4a5560', kArmorLight:'#c8d8e8',
  kVisor:'#1a2030', kGold:'#c8922a', kGoldLight:'#f0c060',
  kCape:'#8b1a1a', kCapeDark:'#5a0e0e',
  kSword:'#c0c8d0', kSwordBlade:'#d8e8f0',
  kShield:'#8b1a1a', kShieldGold:'#c8922a',
  ink:'#0300ff', blood:'#8b1a1a', gold:'#c8922a',
};

// ── GAME STATE ────────────────────────────────────────────
const GROUND_Y = H - 70;
let state = 'idle';
let score = 0, best = 0, lives = 3;
let speed = 5;
let frame = 0;
let obstacles = [];
let clouds = [{x:100,y:30,w:90},{x:350,y:55,w:70},{x:620,y:25,w:110}];
let particles = [];
let Mario;
let flashTimer = 0;
let deathAnim = 0;

function resetMario() {
  Mario = {
    x: 120, y: GROUND_Y - 52,
    vy: 0, jumps: 0,
    running: true,
    dead: false,
    invincible: 0,
    frame: 0,
    swordAngle: 0,
  };
}

function startGame() {
  score = 0; lives = 3; speed = 5;
  obstacles = []; particles = []; frame = 0;
  resetMario();
  const ov = document.getElementById('overlay');
  ov.style.display='none';
  ov.style.background='rgba(4,156,216,0.92)';
  document.getElementById('overlay-score').style.display='none';
  state = 'running';
  updateUI();
}

// ── INPUT ─────────────────────────────────────────────────
function doJump() {
  if (state !== 'running') return;
  if (Mario.dead) return;
  if (Mario.jumps < 2) {
    Mario.vy = Mario.jumps === 0 ? -14 : -11;
    Mario.jumps++;
    spawnJumpDust();
  }
}
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doJump(); } });
canvas.addEventListener('pointerdown', e => { e.preventDefault(); doJump(); });
document.getElementById('start-btn').addEventListener('keydown', e => { if(e.code==='Space') e.preventDefault(); });

// ── MOBILE: JUMP BUTTON ───────────────────────────────────
function handleJumpBtn(e) { e.preventDefault(); doJump(); }

// ── MOBILE: RESPONSIVE SCALING ───────────────────────────
const CANVAS_W = 800;
function scaleGame() {
  const wrapper = document.getElementById('scale-wrapper');
  const availW = window.innerWidth;
  const scale = Math.min(1, availW / (CANVAS_W + 16));
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.marginTop = scale < 1
    ? `-${(wrapper.offsetHeight * (1 - scale)) / 2}px`
    : '0';
}
window.addEventListener('resize', scaleGame);
window.addEventListener('orientationchange', () => { setTimeout(scaleGame, 200); checkOrientation(); });
scaleGame();

// ── MOBILE: LANDSCAPE CHECK ───────────────────────────────
function checkOrientation() {
  const rotOverlay = document.getElementById('rotate-overlay');
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  if (!isMobile) { rotOverlay.style.display = 'none'; return; }
  const isPortrait = window.innerHeight > window.innerWidth;
  rotOverlay.style.display = isPortrait ? 'flex' : 'none';
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));
checkOrientation();

// ── PREVENT DOUBLE-TAP ZOOM ──────────────────────────────
document.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });

// ── PARTICLES ─────────────────────────────────────────────
function spawnJumpDust() {
  for (let i = 0; i < 6; i++) {
    particles.push({ x: Mario.x+10, y: GROUND_Y, vx: (Math.random()-0.5)*3, vy: -Math.random()*2-0.5, life:1, col:'#c8b880' });
  }
}
function spawnDeathParticles() {
  for (let i = 0; i < 18; i++) {
    const ang = (i/18)*Math.PI*2;
    particles.push({ x: Mario.x+20, y: Mario.y+20, vx: Math.cos(ang)*3*(0.5+Math.random()), vy: Math.sin(ang)*3*(0.5+Math.random())-2, life:1, col: i%3===0?C.kGold:i%3===1?C.kArmor:C.kCape });
  }
}

// ── OBSTACLE SPAWNING ─────────────────────────────────────
let spawnCooldown = 0;
function spawnObstacle() {
  if (spawnCooldown > 0) { spawnCooldown--; return; }
  const minGap = Math.max(55, 90 - score/200);
  spawnCooldown = Math.floor(minGap + Math.random()*60);
  const type = Math.random() < 0.5 ? 'block' : 'tree';
  const h = type === 'block' ? (30 + Math.floor(Math.random()*30)) : (50 + Math.floor(Math.random()*40));
  const w = type === 'block' ? 34 : (14 + Math.floor(Math.random()*18)); // trees: 14–32px wide
  obstacles.push({ x: W + 20, type, h, w });
}

// ── DRAWING HELPERS ───────────────────────────────────────
function drawRoundRect(x,y,w,h,r,fill,stroke,sw=1){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}

// ── DRAW BACKGROUND ───────────────────────────────────────
function drawBg() {
  // Sky gradient
  const g = ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#5ab0d4'); g.addColorStop(1,'#c8e8f4');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,GROUND_Y);

  // Sun
  ctx.save();
  ctx.globalAlpha=0.85;
  ctx.beginPath(); ctx.arc(W-60,42,22,0,Math.PI*2);
  ctx.fillStyle=C.sun; ctx.fill();
  ctx.globalAlpha=0.18;
  ctx.beginPath(); ctx.arc(W-60,42,34,0,Math.PI*2);
  ctx.fillStyle=C.sun; ctx.fill();
  ctx.restore();

  // Clouds — Super Mario pixel-art style
  clouds.forEach(cl => {
    const s = cl.w / 64;
    const cx = cl.x - cl.w * 0.5;
    const cy = cl.y;
    ctx.save();
    function pb(x, y, w, h, col) {
      ctx.fillStyle = col;
      ctx.fillRect(Math.round(cx + x*s), Math.round(cy + y*s), Math.round(w*s), Math.round(h*s));
    }
    // Black outline
    pb(8,14,48,4,'#000'); pb(4,10,4,8,'#000'); pb(56,10,4,8,'#000');
    pb(4,6,8,4,'#000'); pb(52,6,8,4,'#000');
    pb(16,2,32,4,'#000'); pb(12,2,4,8,'#000'); pb(48,2,4,8,'#000');
    pb(8,6,4,4,'#000'); pb(52,6,4,4,'#000');
    // White fill
    pb(8,10,48,8,'#fff'); pb(8,6,16,8,'#fff'); pb(40,6,16,8,'#fff'); pb(16,2,32,10,'#fff');
    // Light blue highlight
    pb(10,4,6,4,'#c8ecff'); pb(18,2,8,4,'#c8ecff'); pb(42,4,4,4,'#c8ecff');
    // Eyes
    pb(20,10,4,4,'#000'); pb(38,10,4,4,'#000');
    // Eye shine
    pb(20,10,2,2,'#fff'); pb(38,10,2,2,'#fff');
    ctx.restore();
  });

  // Ground layers — dirt/soil body
  ctx.fillStyle=C.groundBody;
  ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  // Darker soil stripe
  ctx.fillStyle=C.groundBodyDark;
  ctx.fillRect(0, GROUND_Y+18, W, 14);

  // Grass strip along the top of the ground (the surface the Mario runs on)
  ctx.fillStyle=C.groundTop;
  ctx.fillRect(0, GROUND_Y, W, 12);

  // Grass tuft details (scroll with offset)
  ctx.fillStyle=C.groundTopDark;
  const tOff = (frame*speed*0.8) % 50;
  for(let tx=(-tOff); tx<W; tx+=50){
    ctx.beginPath(); ctx.moveTo(tx+2, GROUND_Y); ctx.lineTo(tx+6, GROUND_Y-7); ctx.lineTo(tx+10, GROUND_Y); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx+20, GROUND_Y); ctx.lineTo(tx+24, GROUND_Y-5); ctx.lineTo(tx+28, GROUND_Y); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx+36, GROUND_Y); ctx.lineTo(tx+39, GROUND_Y-4); ctx.lineTo(tx+42, GROUND_Y); ctx.fill();
  }
}

// ── DRAW OBSTACLE ─────────────────────────────────────────
function drawObstacle(o) {
  const bx = o.x, by = GROUND_Y-o.h, bw=o.w, bh=o.h;
if (o.type === 'block') {
  // SMB-style brick block — rows of horizontally staggered bricks
  const brickH = 10;
  const brickW = 18;
  const gap = 2;
  const rows = Math.ceil(bh / (brickH + gap));

  // Background fill (mortar color)
  ctx.fillStyle = '#5a3010';
  ctx.fillRect(bx, by, bw, bh);

  for (let row = 0; row < rows; row++) {
    const ry = by + row * (brickH + gap);
    // Stagger every other row by half a brick width
    const stagger = (row % 2 === 0) ? 0 : -(brickW / 2);
    const startCol = Math.floor(stagger / (brickW + gap)) - 1;
    const endCol = Math.ceil(bw / (brickW + gap)) + 2;

    for (let col = startCol; col < endCol; col++) {
      const rx = bx + stagger + col * (brickW + gap);

      // Clip to block bounds
      const drawX = Math.max(rx, bx);
      const drawW = Math.min(rx + brickW, bx + bw) - drawX;
      const drawY = Math.max(ry, by);
      const drawH = Math.min(ry + brickH, by + bh) - drawY;
      if (drawW <= 0 || drawH <= 0) continue;

      // Main brick fill — SMB orange-brown
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(drawX, drawY, drawW, drawH);

      // Top highlight strip
      ctx.fillStyle = '#e8702a';
      ctx.fillRect(drawX, drawY, drawW, Math.min(2, drawH));

      // Left highlight strip
      ctx.fillStyle = '#e8702a';
      ctx.fillRect(drawX, drawY, Math.min(2, drawW), drawH);

      // Bottom shadow strip
      ctx.fillStyle = '#7a2800';
      if (drawY + drawH >= ry + brickH - 2)
        ctx.fillRect(drawX, drawY + drawH - 2, drawW, 2);

      // Right shadow strip
      ctx.fillStyle = '#7a2800';
      if (drawX + drawW >= rx + brickW - 2)
        ctx.fillRect(drawX + drawW - 2, drawY, 2, drawH);
    }
  }

  // Outer black border
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);

} else {
    // 8-bit Piranha Plant — green & white, larger
    ctx.save();
    const s = o.w / 14; // larger scale (was /20)
    const ox = bx - s;  // slight left offset to center the wider head
    const oy = GROUND_Y;
    function pp(x, y, w, h, col) {
      ctx.fillStyle = col;
      ctx.fillRect(Math.round(ox + x*s), Math.round(oy - y*s - h*s), Math.round(w*s), Math.round(h*s));
    }
    // Pipe body (dark green)
    pp(4,  0, 12, 14, '#147b14');
    pp(5,  0,  3, 14, '#1ea81e');
    // Pipe rim
    pp(2, 14, 16,  3, '#147b14');
    pp(3, 14,  5,  3, '#1ea81e');
    // Pipe outline
    ctx.strokeStyle='#000'; ctx.lineWidth=Math.max(1, s*0.6);
    ctx.strokeRect(Math.round(ox+4*s), Math.round(oy-14*s), Math.round(12*s), Math.round(14*s));
    ctx.strokeRect(Math.round(ox+2*s), Math.round(oy-17*s), Math.round(16*s), Math.round(3*s));
    // Stem (green)
    pp(7, 17, 6, 9, '#1ea81e');
    pp(8, 17, 2, 9, '#3ecf3e');
    // Head — green body (was red, now green)
    pp(1, 26, 18, 12, '#1ea81e');
    // Head highlight (lighter green, top-left)
    pp(2, 33,  5,  4, '#3ecf3e');
    // Head shadow (darker green, bottom-right)
    pp(13,26,  6,  4, '#147b14');
    // White lip band
    pp(1, 26, 18,  3, '#ffffff');
    // Teeth (white)
    pp(2, 29,  3,  3, '#ffffff');
    pp(7, 29,  3,  3, '#ffffff');
    pp(12,29,  3,  3, '#ffffff');
    // Inner mouth (dark green instead of dark red)
    pp(2, 26, 16,  3, '#0a3d0a');
    // White spots on head
    pp(4, 32,  3,  3, '#ffffff');
    pp(11,32,  3,  3, '#ffffff');
    pp(7, 36,  2,  2, '#ffffff');
    // Eyes (white then dark pupil)
    pp(3, 34,  4,  4, '#ffffff');
    pp(13,34,  4,  4, '#ffffff');
    pp(4, 35,  2,  2, '#000000');
    pp(14,35,  2,  2, '#000000');
    // Head outline
    ctx.strokeStyle='#000'; ctx.lineWidth=Math.max(1, s*0.6);
    ctx.strokeRect(Math.round(ox+1*s), Math.round(oy-38*s), Math.round(18*s), Math.round(12*s));
    ctx.restore();
  }
}

// ── DRAW MARIO-STYLE SPRITE ───────────────────────────────
function drawMario() {
  const kx = Mario.x, ky = Mario.y;
  const t = frame;

  // Flicker if invincible
  if (Mario.invincible > 0 && Math.floor(t/4)%2===1) return;

  ctx.save();
  ctx.translate(kx, ky);

  const scale = 2; // pixel scale
  const walk = Math.sin(t * 0.2);

  function px(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x*scale), Math.round(y*scale),
                 Math.round(w*scale), Math.round(h*scale));
  }

  // COLORS (Mario palette-ish)
  const red = "#d32";
  const blue = "#36c";
  const skin = "#f2c29b";
  const brown = "#5a3b1a";
  const black = "#000";

  // --- FEET (animated) ---
  const footOffset = walk * 1.5;
  px(6, 28 + footOffset, 6, 4, brown);
  px(14, 28 - footOffset, 6, 4, brown);

  // --- LEGS ---
  px(6, 20, 6, 8, blue);
  px(14, 20, 6, 8, blue);

  // --- BODY (overalls) ---
  px(6, 12, 14, 10, blue);

  // straps
  px(8, 12, 2, 6, red);
  px(16, 12, 2, 6, red);

  // buttons
  px(9, 16, 2, 2, "#ff0");
  px(15, 16, 2, 2, "#ff0");

  // --- ARMS ---
  const armSwing = walk * 2;

  // left arm
  px(2, 12 + armSwing, 4, 8, red);
  px(2, 20 + armSwing, 4, 4, skin);

  // right arm
  px(20, 12 - armSwing, 4, 8, red);
  px(20, 20 - armSwing, 4, 4, skin);

  // --- HEAD ---
  px(6, 4, 14, 10, skin);

  // --- MUSTACHE ---
  px(8, 10, 10, 2, brown);

  // --- EYES ---
  px(9, 6, 2, 2, black);
  px(15, 6, 2, 2, black);

  // --- HAT ---
  px(4, 0, 18, 6, red);
  px(6, 2, 14, 4, red);

  // brim
  px(6, 6, 14, 2, red);

  ctx.restore();
}

// ── PARTICLES ─────────────────────────────────────────────
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x,p.y,4,4);
    ctx.globalAlpha = 1;
  });
}

// ── COLLISION ─────────────────────────────────────────────
function checkCollision(o) {
  if (Mario.invincible > 0) return false;
  const kLeft=Mario.x+8, kRight=Mario.x+36, kTop=Mario.y+4, kBot=Mario.y+52;
  const oLeft=o.x+2, oRight=o.x+o.w-2, oTop=GROUND_Y-o.h, oBot=GROUND_Y+2;
  return kRight>oLeft && kLeft<oRight && kBot>oTop && kTop<oBot;
}

// ── UI ────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('score-display').textContent = Math.floor(score);
  document.getElementById('best-display').textContent = Math.floor(best);
  document.getElementById('lives-display').textContent = '♥ '.repeat(lives).trim() || '✝';
}

// ── GAME LOOP ─────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (state !== 'running') { drawBg(); return; }

  frame++;
  score += speed * 0.05;
  if (score > best) best = score;
  speed = 5 + Math.floor(score/300)*0.5;

  // ── WIN CONDITION ─────────────────────────────────────────
  if (score >= 985 && state === 'running') {
    state = 'won';
    setTimeout(showWin, 400);
  }

  // Move clouds
  clouds.forEach(cl => { cl.x -= speed*0.15; if(cl.x+cl.w*0.6<0) cl.x=W+cl.w; });

  // Spawn & move obstacles
  spawnObstacle();
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -80);

  // Mario physics
  if (!Mario.dead) {
    Mario.y += Mario.vy;
    Mario.vy += 0.7; // gravity
    if (Mario.y >= GROUND_Y - 52) { Mario.y = GROUND_Y - 52; Mario.vy = 0; Mario.jumps = 0; }
    if (Mario.invincible > 0) Mario.invincible--;

    // Collision
    for (const o of obstacles) {
      if (checkCollision(o)) {
        lives--;
        Mario.invincible = 90;
        spawnDeathParticles();
        flashTimer = 20;
        updateUI();
        if (lives <= 0) {
          state = 'dead';
          setTimeout(showGameOver, 600);
        }
        break;
      }
    }
  }

  // Draw everything
  drawBg();

  // Flash on hit
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(200,50,50,${flashTimer/40})`;
    ctx.fillRect(0,0,W,H);
    flashTimer--;
  }

  obstacles.forEach(drawObstacle);
  drawMario();
  updateParticles();
  updateUI();
}

function showGameOver() {
  const ov = document.getElementById('overlay');
  ov.style.display='flex';
  document.getElementById('overlay-title').textContent = '🍄 Defeat 🍄';
  document.getElementById('overlay-msg').textContent = 'Mario has fallen!';
  const sc = document.getElementById('overlay-score');
  sc.style.display='block';
  sc.textContent = `Distance: ${Math.floor(score)}  |  Best: ${Math.floor(best)}`;
  document.getElementById('start-btn').textContent = 'Play Again';
}

function showWin() {
  const ov = document.getElementById('overlay');
  ov.style.background = 'rgba(10,30,10,0.88)';
  ov.style.display='flex';
  document.getElementById('overlay-title').textContent = '🏆 Quest Complete! 🏆';
  document.getElementById('overlay-msg').textContent = 'Congratulations! Here is your keyword:';
  const sc = document.getElementById('overlay-score');
  sc.style.display='block';
  sc.style.fontSize='1.05rem';
  sc.style.letterSpacing='0.12em';
  sc.textContent = 'Warpzone';
  document.getElementById('start-btn').textContent = 'Play Again';
}

// ── IDLE PREVIEW ──────────────────────────────────────────
resetMario();
loop();
</script>
